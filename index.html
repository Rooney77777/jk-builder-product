<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>
    
    <div class="container">
        <div class="machine-container">
            <div class="glass-sphere">
                <div class="inner-glow"></div>
                <div class="balls-inside" id="machine-balls">
                    <!-- Decorative balls -->
                    <div class="ball-deco b1"></div>
                    <div class="ball-deco b2"></div>
                    <div class="ball-deco b3"></div>
                    <div class="ball-deco b4"></div>
                </div>
            </div>
            <div class="machine-base">
                <div class="exit-chute"></div>
            </div>
        </div>

        <h1>Premium Lotto</h1>
        
        <div id="lotto-results" class="results-grid">
            <!-- 5 rows will be generated here -->
        </div>

        <button id="generate-btn" class="generate-btn">Draw 5 Sets</button>

        <div class="partnership-footer">
            <hr class="separator">
            <a href="partnership.html" class="nav-btn">Partnership Inquiry</a>
        </div>

        <div class="comments-section">
            <hr class="separator">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.

                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://atomic-1.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
