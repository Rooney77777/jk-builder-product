<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Inquiry - Premium Lotto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>
    
    <div class="container">
        <div class="partnership-header">
            <h1>Partnership Inquiry</h1>
            <p>Tell us more about how we can collaborate.</p>
        </div>

        <form action="https://formspree.io/f/xyknnyod" method="POST" class="contact-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <div class="back-footer">
            <hr class="separator">
            <a href="index.html" class="nav-btn secondary">Back to Home</a>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
